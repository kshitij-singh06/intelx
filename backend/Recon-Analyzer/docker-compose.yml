services:
  recon-analyzer:
    build:
      context: .
      Dockerfile: dockerfile
    container_name: recon-analyzer-api
    ports:
      - "5003:5000"
    env_file:
      - .env
    environment:
      - PORT=5000
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/Recon-Analyzer/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - intelx-network

networks:
  intelx-network:
    driver: bridge
    name: intelx-network
