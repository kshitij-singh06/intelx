  #         memory: 256M
  #   networks:
  #     - intelx-network

  # ============================================
  # STEG ANALYZER - Port 5002
  # ============================================
  steg-analyzer:
    build:
      context: ./Steg-Analyzer
      dockerfile: Dockerfile
    container_name: steg-analyzer
    restart: always
    ports:
      - "5002:5000"
    volumes:
      - ./Steg-Analyzer/intelx:/app/intelx
    depends_on:
      steg-postgres:
        condition: service_healthy
      steg-initdb:
        condition: service_completed_successfully
      steg-redis:
        condition: service_started
      steg-worker:
        condition: service_started
    environment:
      - DB_URI=postgresql://intelxuser:intelxpass@steg-postgres:5432/intelx
      - REDIS_URL=redis://steg-redis:6379/0
      - POSTGRES_USER=intelxuser
      - POSTGRES_PASSWORD=intelxpass
      - POSTGRES_DB=intelx
    networks:
      - intelx-network

  steg-worker:
    build:
      context: ./Steg-Analyzer
      dockerfile: Dockerfile
    container_name: steg-worker
    restart: always
    command: rq worker default --url redis://steg-redis:6379/0
    volumes:
      - ./Steg-Analyzer/intelx:/app/intelx
    depends_on:
      steg-postgres:
        condition: service_healthy
      steg-initdb:
        condition: service_completed_successfully
      steg-redis:
        condition: service_started
    environment:
      - DB_URI=postgresql://intelxuser:intelxpass@steg-postgres:5432/intelx
      - REDIS_URL=redis://steg-redis:6379/0
      - POSTGRES_USER=intelxuser
      - POSTGRES_PASSWORD=intelxpass
      - POSTGRES_DB=intelx
    networks:
      - intelx-network

  steg-initdb:
    build:
      context: ./Steg-Analyzer
      dockerfile: Dockerfile
    container_name: steg-initdb
    command: python -m intelx.utils.init_db
    volumes:
      - ./Steg-Analyzer/intelx:/app/intelx
    depends_on:
      steg-postgres:
        condition: service_healthy
    environment:
      - DB_URI=postgresql://intelxuser:intelxpass@steg-postgres:5432/intelx
      - POSTGRES_USER=intelxuser
      - POSTGRES_PASSWORD=intelxpass
      - POSTGRES_DB=intelx
    restart: "no"
    networks:
      - intelx-network

  steg-redis:
    image: redis:7
    container_name: steg-redis
    restart: always
    networks:
      - intelx-network

  steg-postgres:
    image: postgres:14
    container_name: steg-postgres
    restart: always
    volumes:
      - steg-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U intelxuser -d intelx"]
      interval: 5s
      timeout: 5s
      retries: 5
    environment:
      - POSTGRES_USER=intelxuser
      - POSTGRES_PASSWORD=intelxpass
      - POSTGRES_DB=intelx
    networks:
      - intelx-network

  # ============================================
  # RECON ANALYZER - Port 5003
  # ============================================
  recon-analyzer:
    build:
      context: ./Recon-Analyzer
      dockerfile: Dockerfile
    container_name: recon-analyzer
    ports:
      - "5003:5000"
    env_file:
      - ./Recon-Analyzer/.env
    environment:
      - PORT=5000
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/Recon-Analyzer/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - intelx-network

  # ============================================
  # URL ANALYZER - Port 5004
  # ============================================
  url-analyzer:
    build:
      context: ./Url-Analyzer
      dockerfile: Dockerfile
    container_name: url-analyzer
    ports:
      - "5004:5000"
    env_file:
      - ./Url-Analyzer/.env
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
    volumes:
      - ./Url-Analyzer:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - intelx-network

  # ============================================
  # WEB ANALYZER - Port 5001
  # ============================================
  web-analyzer:
    build:
      context: ./Web-Analyzer
      dockerfile: Dockerfile
    container_name: web-analyzer
    ports:
      - "5001:5000"
    environment:
      - FLASK_ENV=production
      - PORT=5000
      - API_TIMEOUT_LIMIT=20000
      - API_CORS_ORIGIN=*
      - API_ENABLE_RATE_LIMIT=false
    volumes:
      - ./Web-Analyzer:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - intelx-network

# ============================================
# VOLUMES
# ============================================
volumes:
  # malware-uploads:
  steg-pgdata:

# ============================================
# NETWORKS
# ============================================
networks:
  intelx-network:
    driver: bridge
    name: intelx-network