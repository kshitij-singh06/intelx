# IntelX Backend - Unified Docker Compose
# Runs all 5 analyzers with a single command: docker-compose up -d
services:
  # ============================================
  # MALWARE ANALYZER - Port 5000
  # ============================================
  # malware-analyzer:
  #   build:
  #     context: ./Malware-Analyzer
  #     dockerfile: Dockerfile
  #   platform: linux/amd64
  #   container_name: malware-analyzer
  #   ports:
  #     - "5000:5000"
  #   env_file:
