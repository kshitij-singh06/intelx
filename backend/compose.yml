  #   environment:
  #     - PORT=5000
  #     - FLASK_DEBUG=false
  #   volumes:
  #     - ./Malware-Analyzer:/app
  #     - malware-uploads:/app/uploads
  #   restart: unless-stopped
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:5000/api/malware-analyzer/health"]
  #     interval: 30s
