services:
  # Web Analyzer - Port 5005
  - type: web
    name: web-analyzer
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: "cd backend/Web-Analyzer && gunicorn -w 1 -b 0.0.0.0:5000 run:app"
    healthCheckPath: /api/web-analyzer/health
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PORT
        value: 5000
      - key: PYTHONUNBUFFERED
        value: "1"

  # URL Analyzer - Port 5004
  - type: web
    name: url-analyzer
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: "cd backend/Url-Analyzer && gunicorn -w 1 -b 0.0.0.0:5000 app:app"
    healthCheckPath: /api/url-analyzer/health
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PORT
        value: 5000

  # Recon Analyzer - Port 5003
  - type: web
    name: recon-analyzer
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: "cd backend/Recon-Analyzer && python src/cli.py"
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PORT
        value: 5000

  # Steg Analyzer - Port 5002
  - type: web
    name: steg-analyzer
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: "cd backend/Steg-Analyzer && gunicorn -w 1 -b 0.0.0.0:5000 intelx.app:app"
    healthCheckPath: /health
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DB_URI
        sync: false
      - key: REDIS_URL
        sync: false


